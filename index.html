<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Mago da Adivinhação✨</title>

    <style>
        body{
            display: flex;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(to top,rgba(1, 1, 36, 1) 0%, rgba(5, 5, 89, 1) 67%, rgba(2, 2, 156, 1) 100%);
            overflow: hidden;
            align-items: center;
            justify-content: center;
        }
        .container{
            background-color: rgb(35, 0, 116);
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            color: rgb(209, 209, 209);
            font-size: 20px;
        }
        button{
            color: rgb(209, 209, 209);
            background-color: rgb(59, 0, 161);
            border-radius: 25px;
            padding: 10px;
            width: 60%;
            border-color: rgb(209, 209, 209);
            margin: 10px;
        }
        .info{
            font-size: 11px;
        }
    </style>

</head>


<body>
    <div class="container">
        <h1>O Mago da Adivinhação✨</h1>
        <p>Clique no botão abaixo para iniciar a mágica!🎇🌟</p>
        <button onclick="mago()">Iniciar o feitiço</button>
        <button onclick="magoDeNovo()">Jogar novamente</button>
        <button onclick="magoExplica()">Mago explica</button>
        <button onclick="magoTriplo()">Mago triplo</button>
        <p class="info">Gostaria de tentar novamente? Apenas clique no botão acima.</p>
    </div>

 
    <script>
        function mago(){
            alert('Seja muito bem-vindo ao nosso jogo!');
            alert('Sua tarefa é seguir nossas instruções, através de feitiços, entraremos na sua mente...');
            alert('Antes de começar tenha uma calculadora em mãos!');
            let valor_final = Number(prompt('Qual número você deseja qua apareça na sua calculadora após nossa mágica?'));
/****************************************************************************************************************************/ 
            let mult_01 = valor_final*2;
            let valor_inicial = Number(prompt('Agora, escolha um número para ser o valor inicial. Lembre-se dele!'));
            let mult_02 = valor_inicial*2;
            let soma = mult_02 + mult_01;
            let div = soma/2;
            let sub = div - valor_inicial;
/****************************************************************************************************************************/
            alert('Pronto?');
            alert('Multiplique o número escolhido por 2.');
            alert('Agora, some '+ mult_01 +' ao resultado.');
            alert('Divida o valor encontrado por 2.');
            alert('Por fim, subtraia o valor inicial do resultado da divisão.');
            alert('O número que está na sua calculadora é: '+ sub+ '?');
            alert('Caso nossa mágica não tenha dado certo, tente novamente e lembre-se de seguir as instruções corretamente!');
   
        };
        
        function magoDeNovo(){
            alert('Seja muito bem-vindo ao nosso jogo!');
            alert('Sua tarefa é seguir nossas instruções, descubra a nossa...');
            alert('Pegue sua calculadora!');
            let valor_final = Number(prompt('Qual número você deseja qua apareça na sua calculadora após nossa mágica?'));
/****************************************************************************************************************************/ 
            let mult_01 = valor_final*2;
            let valor_inicial = Number(prompt('Agora, escolha um número para ser o valor inicial. Lembre-se dele!'));
            let mult_02 = valor_inicial*2;
            let soma = mult_02 + mult_01;
            let div = soma/2;
            let sub = div - valor_inicial;
/****************************************************************************************************************************/
            alert('Vamos lá?');
            alert('Multiplique o número inicial por 2.');
            alert('Some '+ mult_01 +' ao resultado anterior.');
            alert('Faça uma divisão por 2.');
            alert('Subtraia o valor inicial do resultado da divisão.');
            alert('Olha sua calculadora, acertamos?');
            alert('Caso nossa mágica não tenha dado certo, tente novamente e lembre-se de seguir as instruções corretamente!');
   
        };
        function magoExplica(){
            alert('Um bom mágico jamais revelaria seus segredos!');
            alert('Mas acho que posso abrir uma excessão...');
            alert('A lógica do truque não se baseia em mágica, mas sim na matemática!');
            alert('Através das operações opostas, todos os números se anulam, restando apenas o número introduzido pelo mágico.');
            alert('amos fazer um passo a passo!');
            alert('Escolha um número ou peça para a pessoa escolher um número para ser o final, por exemplo, o número 5.');
            alert('Peça para a pessoa escolher qualquer número.');
            alert('Agora multiplique o valor por 2(deixando tanto o valor esperado quanto o inicial proporcionais).');
            alert('Some o valor obtido a 10 (resultado do 5 multiplicado também por 2).');
            alert('Agora divida o número por 2 ("anulando" as multiplicações).');
            alert('Subtraia o número inicial escolhido.');
            alert('O resultado final será sempre a metade do número que o mágico pediu para somar ao número inicial.');
            alert('Agora você já é um mágico experiente! Teste esse truque com alguém e não conte o segredo por trás...');
        };

        function magoTriplo(){
            alert('Seja muito bem-vindo ao nosso jogo!');
            alert('Sua tarefa é seguir nossas instruções, através de feitiços, entraremos na sua mente...');
            alert('Antes de começar tenha uma calculadora em mãos!');
            let valor_final = Number(prompt('Qual número você deseja qua apareça na sua calculadora após nossa mágica?'));
/****************************************************************************************************************************/ 
            let mult_01 = valor_final*3;
            let valor_inicial = Number(prompt('Agora, escolha um número para ser o valor inicial. Lembre-se dele!'));
            let mult_02 = valor_inicial*3;
            let soma = mult_02 + mult_01;
            let div = soma/3;
            let sub = div - valor_inicial;
/****************************************************************************************************************************/
            alert('Pronto?');
            alert('Multiplique o número escolhido por 3.');
            alert('Agora, some '+ mult_01 +' ao resultado.');
            alert('Divida o valor encontrado por 3.');
            alert('Por fim, subtraia o valor inicial do resultado da divisão.');
            alert('O número que está na sua calculadora é: '+ sub+ '?');
            alert('Caso nossa mágica não tenha dado certo, tente novamente e lembre-se de seguir as instruções corretamente!');
   
        };
    </script>
</body>

</html>
